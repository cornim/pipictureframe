[tox]
minversion = 1.6
envlist = py39,black,twine-check,flake8

[testenv]
passenv = GITLAB_IMAGE GITLAB_TAG
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/requirements-test.txt
commands = pytest {posargs}

[testenv:flake8]
deps = flake8
commands =
  flake8 {posargs} --config tox.ini {toxinidir}

[testenv:black]
basepython = python3
deps = black==25.1.0
commands =
  black --check --diff {posargs} {toxinidir}

[testenv:twine-check]
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
    build
    twine
commands =
    python -m build
    twine check dist/*

[testenv:twine-upload]
basepython = python3
allowlist_externals = rm*
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
    build
    twine
commands =
    rm -rf {toxinidir}/dist/
    rm -rf {toxinidir}/build/
    python -m build
    twine upload dist/*

[testenv:cover]
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
commands =
    #pytest --cov {toxinidir} --cov-config tox.ini --cov-report term --cov-report html --cov-report xml tests {posargs}
    coverage run -p --source={envsitepackagesdir}/pipictureframe -m pytest
    coverage combine
    coverage report
    coverage html
    coverage xml

[coverage:paths]
source =
    src/pipictureframe/
    **/site-packages/pipictureframe

[flake8]
max-line-length = 120
exclude =
    .git,
    .tox,
    .pytest_cache,
    *.egg-info,
    __pycache__,
    venv,
    .idea,
    build,
    dist
